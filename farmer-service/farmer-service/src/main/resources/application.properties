spring.application.name=farmer-service
server.port=8081

# ─────────────────────────────────────────
# MySQL Database
# ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/agridb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─────────────────────────────────────────
# Kafka
# ─────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# ─────────────────────────────────────────
# Kafka Topics
# ─────────────────────────────────────────
kafka.topic.farmer-registered=farmer.registered

# ─────────────────────────────────────────
# Logging
# ─────────────────────────────────────────
logging.level.com.agriconnect=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# ─────────────────────────────────────────
# Actuator (Health Check)
# ─────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always